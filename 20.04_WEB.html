<html> 
    <head>
        <style type="text/css">
            H1, H2, H3, H4, H5, H6 {color: red; font-weight: bold;}
            H2 {color: blue; font-weight: bold}
            p {color: green}
            p i {color: red; font-weight: bold;} 
        </style>
    </head>
    <body>
        <h1>
            Привет, мир!
        </h1>
        <h2>
            Второй заголовок
        </h2>
        <p>
            А это обычный абзац
        </p>
        <p>
            <i>
                А это стилизированный абзац
            </i>
        </p>
    </body>
</html>
