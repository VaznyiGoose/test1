<!DOCTYPE HTML>
<html>
<body>

<p><b>Анкета сотрудника</b></p>

<form name="anketa" onSubmit="show()">

Фамилия <input type="text" name="f"><br>
Имя <input type="text" name="n"><br>
Отчество <input type="text" name="o"><br>
Дата рождения <input type="date" name="d"><br>

Пол
<input type="radio" name="s">Мужской
<input type="radio" name="s">Женский
<br>

Гражданство
<select name="r">
<option>РФ</option>
<option>США</option>
<option>Испания</option>
<option>Исландия</option>
</select>
<br>

Увлечения
<input type="checkbox" name="game">Спорт
<input type="checkbox" name="travel">Самообразование
<input type="checkbox" name="code">Искусство
<input type="checkbox" name="sport">Другое
<br>

<input type="submit" value="Показать данные">

</form>

<script>

function show(){

event.preventDefault()

f=document.anketa.f.value
n=document.anketa.n.value
o=document.anketa.o.value
d=document.anketa.d.value
r=document.anketa.r.value

if(document.anketa.s[0].checked) s="Мужской"
if(document.anketa.s[1].checked) s="Женский"

h=""

if(document.anketa.game.checked) h+="Спорт "
if(document.anketa.travel.checked) h+="Самообразование "
if(document.anketa.code.checked) h+="Искусство "
if(document.anketa.sport.checked) h+="Другое "

alert(
"Фамилия: "+f+
"\nИмя: "+n+
"\nОтчество: "+o+
"\nДата рождения: "+d+
"\nПол: "+s+
"\nГражданство: "+r+
"\nУвлечения: "+h
)

}

</script>

</body>
</html>
